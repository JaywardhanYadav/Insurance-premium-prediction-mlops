# Advanced Chained Insurance Prediction Pipeline — Central Configuration

project:
  name: insurance-chained-pipeline
  version: "2.0.0"
  random_seed: 42

paths:
  raw_data: data/raw/medical_insurance_cost_dataset_enhanced.csv
  processed_data: data/processed/training_features.parquet
  reference_data: data/reference/reference_snapshot.parquet
  models_dir: models
  mlflow_tracking_uri: sqlite:///mlruns/mlflow.db
  mlflow_experiment_name: insurance_chained_pipeline

columns:
  customer_id: customer_id
  target_regression: annual_medical_premium      # maps from annual_medical_cost_usd
  source_regression: annual_medical_cost_usd

database:
  driver: ODBC Driver 18 for SQL Server
  host: ${MSSQL_HOST:localhost}
  port: ${MSSQL_PORT:1433}
  database: ${MSSQL_DATABASE:InsuranceDB}
  username: ${MSSQL_USER:sa}
  password: ${MSSQL_PASSWORD:YourStrong!Passw0rd}
  trusted_connection: ${MSSQL_TRUSTED_CONNECTION:false}
  # SQLAlchemy connection pool settings
  pool_size: 5
  max_overflow: 10
  pool_pre_ping: true
  echo: false

mlflow:
  experiment_name: insurance_chained_pipeline
  run_name_prefix: chained_train
  log_models: true
  register_models: false
  model_names:
    regressor: premium_regressor

training:
  test_size: 0.15
  validation_size: 0.10
  regression:
    objective: reg:squarederror
    n_estimators: 1000
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.5
    early_stopping_rounds: 50
  lightgbm:
    objective: regression
    n_estimators: 1000
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 20
    reg_alpha: 0.1
    reg_lambda: 1.5
    early_stopping_rounds: 50
  ensemble:
    xgb_weight: 0.5
  tier_derivation:
    thresholds: [15000, 30000]
    labels: ["Basic", "Standard", "Premium"]

features:
  binary_columns:
    - smoker
    - diabetes
    - gender
  categorical_columns:
    - region
    - occupation
    - marital_status
  numeric_columns:
    - age
    - bmi
    - children
    - annual_income_usd
    - chronic_diseases
    - doctor_visits_per_year
    - hospitalizations_last_year
    - alcohol_consumption_per_week
    - cholesterol
    - sleep_hours
    - stress_level
    - bp_systolic
    - bp_diastolic
    - pulse_pressure
    - smoker
    - diabetes
    - gender
    - exercise_level
    # Interaction features
    - age_smoker
    - bmi_exercise
    # New engineered features (v2)
    - bmi_category
    - age_group
    - bp_category
    - income_per_child
    - risk_score
    - smoker_cholesterol
    - age_chronic
    - stress_sleep
    - stress_squared
    - cholesterol_squared
    - medical_visits_total
    - age_bmi
    - smoker_bmi
    - smoker_obese
    - hypertension
    - smoker_hypertension
    - age_smoker_bmi
    - high_risk_chronic
    - smoker_obese_interaction
    - income_age_ratio

api:
  host: "0.0.0.0"
  port: 8001
  reload: false
  title: Insurance Chained Prediction API
  version: "2.0.0"
  cors_origins:
    - "*"
  mlflow_model_uri_prefix: runs:/

dashboard:
  api_base_url: ${API_BASE_URL:http://localhost:8001}
  page_title: Insurance Plan Advisor
  page_icon: "🏥"

monitoring:
  reference_data_path: data/reference/reference_snapshot.parquet
  production_log_table: inference_logs
  drift_report_dir: reports/drift
  schedule_cron: "0 0 * * 0"  # weekly Sunday midnight
  evidently:
    numerical_features:
      - age
      - bmi
      - annual_income_usd
      - cholesterol
      - sleep_hours
      - stress_level
      - bp_systolic
      - bp_diastolic
      - pulse_pressure
      - predicted_annual_premium
    categorical_features:
      - region
      - occupation
      - marital_status
      - exercise_level
    target_regression: annual_medical_premium

# Hyperparameter tuning with Optuna
hyperparameter_tuning:
  enabled: true
  n_trials: 25
  random_seed: 42
  max_threads: 4

feature_engineering:
  winsorise_quantiles: [0.01, 0.99]
  enable_interactions: true
